agent:
  id: news
  name: "News Analysis Agent"
  llm:
    provider: anthropic
    model: claude-sonnet-4-20250514
  skills:
    - news_analysis
  memory:
    type: local
    path: ./memory
  config:
    watchlist_source: shared
    scoring:
      base_score: 5.0
      sentiment_multiplier: 1.5
      articles_per_ticker: 10
      lookback_days: 3
    positive_keywords:
      - beat
      - surge
      - rally
      - upgrade
      - record
      - growth
    negative_keywords:
      - miss
      - crash
      - downgrade
      - layoff
      - lawsuit
      - investigation
    api_timeouts:
      finnhub: 10
