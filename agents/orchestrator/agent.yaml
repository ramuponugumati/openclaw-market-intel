agent:
  id: orchestrator
  name: "Market Intel Orchestrator"
  llm:
    provider: anthropic
    model: claude-sonnet-4-20250514
  skills:
    - fleet_launcher
    - score_combiner
    - pick_selector
    - message_formatter
  memory:
    type: local
    path: ./memory
  config:
    fleet_timeout_s: 120
    poll_interval_s: 5
    default_weights:
      fundamentals: 0.18
      sentiment: 0.15
      macro: 0.10
      news: 0.15
      technical: 0.15
      premarket: 0.12
      congress: 0.15
    min_days_for_learned_weights: 5
    etf_tickers:
      - SPY
      - QQQ
      - IWM
      - DIA
      - ARKK
    options_picks_count: 5
    stock_picks_count: 10
